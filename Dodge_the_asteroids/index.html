<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Dodge the asteroids!</title>
  </head>
  <body>
    <div class="game">
      <div class="score"></div>
      <div class="score bullet-count hide">
        Bullets Left: <span class="bullet">10</span>
      </div>

      <div class="start-screen">
        <p>
          Click here to start <br />
          Arrow keys to move <br />
          If you come too close to an asteroid, YOU LOSE! <br />
          Collect bullet packs, you don't have unlimited bullets!
        </p>
      </div>
      <div class="game-area hide"></div>
    </div>

    <img src="imgs/explosion.png" alt="Explosion" class="hide explosion" />

    <img src="imgs/up_arrow.png" alt="up arrow" class="y-arrows up-arrow" />
    <img
      src="imgs/down_arrow.png"
      alt="down arrow"
      class="y-arrows down-arrow"
    />
    <img
      src="imgs/left_arrow.png"
      alt="left arrow"
      class="x-arrows left-arrow"
    />
    <img
      src="imgs/right_arrow.png"
      alt="right arrow"
      class="x-arrows right-arrow"
    />

    <img src="imgs/shoot.png" alt="Shoot button" class="shoot" />

    <script src="script.js"></script>
  </body>
</html>
