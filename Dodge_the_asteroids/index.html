<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Dodge the asteroids!</title>
  </head>
  <body>
    <div class="game">
      <div class="score"></div>
      <div class="score bullet-count hide">
        Bullets Left: <span class="bullet">10</span>
      </div>

      <div class="start-screen">
        <p>
          Click here to start <br />
          Arrow keys to move <br />
          If you come too close to an asteroid, YOU LOSE!
        </p>
      </div>
      <div class="game-area hide"></div>
    </div>

    <img src="imgs/explosion.png" alt="Explosion" class="hide" />

    <script src="script.js"></script>
  </body>
</html>
